services:
  # ── WAGMIOS Backend ─────────────────────────────────────────
  # REST API for Docker management. Mounts the Docker socket.
  backend:
    image: itzmizzle/wagmi:backend-latest
    container_name: wagmios-backend
    ports:
      - "5179:5179"
    volumes:
      - wagmios_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ${WAGMIOS_HOST_PATH:-./data}/containers:/app/data/containers
    environment:
      - PORT=5179
      - WAGMIOS_DATA_DIR=/app/data
    networks:
      - wagmios-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5179/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── WAGMIOS Frontend ────────────────────────────────────────
  # Web UI for managing Docker and creating API keys.
  frontend:
    image: itzmizzle/wagmi:frontend-latest
    container_name: wagmios-frontend
    ports:
      - "5174:5174"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://wagmios-backend:5179
      - VITE_WS_URL=ws://wagmios-backend:5179
      - VITE_BACKEND_PORT=5179
    networks:
      - wagmios-network
    restart: unless-stopped
    volumes:
      - frontend_data:/app/data

  # ── ClawMachine MCP Server ──────────────────────────────────
  # MCP server that gives AI agents scoped access to Docker.
  # Uses stdio transport — AI clients pipe stdin/stdout.
  # For SSE (remote clients), add: -transport sse -sse-addr :8080
  #   and uncomment the ports section below.
  clawmachine:
    image: itzmizzle/clawmachine:latest
    container_name: clawmachine
    depends_on:
      backend:
        condition: service_healthy
    # stdio mode (default — for Claude Code, Cursor, etc.):
    command:
      - "-api-url"
      - "http://wagmios-backend:5179"
      - "-api-key"
      - "${WAGMIOS_API_KEY}"
    # SSE mode (uncomment for remote/web clients):
    # command:
    #   - "-api-url"
    #   - "http://wagmios-backend:5179"
    #   - "-api-key"
    #   - "${WAGMIOS_API_KEY}"
    #   - "-transport"
    #   - "sse"
    #   - "-sse-addr"
    #   - ":8080"
    #   - "-sse-base-url"
    #   - "http://localhost:8080"
    # ports:
    #   - "8080:8080"
    networks:
      - wagmios-network
    stdin_open: true
    tty: true
    restart: unless-stopped

networks:
  wagmios-network:
    driver: bridge

volumes:
  wagmios_data:
  frontend_data: